  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f0f0ec;
      --green: #007a3d;
      --red: #c1272d;
      --grey: #8a8a8a;
      --card-bg: rgba(16, 16, 16, 0.85);
      --border: rgba(255,255,255,0.08);
      --radius: 6px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== BACKGROUND ===== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      /* Fallback gradient using flag colors — no external image needed */
      background:
        radial-gradient(ellipse at 20% 0%, rgba(193,39,45,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(0,122,61,0.12) 0%, transparent 50%),
        var(--black);
      pointer-events: none;
    }

    /* If you have a background image, uncomment this and it layers on top of the gradient fallback */
    /*
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('palestine.jpg') center/cover no-repeat;
      filter: blur(2px) brightness(0.3);
      pointer-events: none;
    }
    */

    /* ===== LAYOUT ===== */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 2rem 1.25rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .header h1 .emoji {
      display: inline-block;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--grey);
      line-height: 1.5;
      max-width: 320px;
    }

    /* ===== LANGUAGE TOGGLE ===== */
    .lang-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 100px;
      overflow: hidden;
      align-self: center;
    }

    .lang-btn {
      background: transparent;
      border: none;
      color: var(--grey);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.45rem 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .lang-btn .flag-emoji {
      font-size: 1rem;
      line-height: 1;
    }

    .lang-btn.active {
      background: var(--white);
      color: var(--black);
    }

    .lang-btn:not(.active):hover {
      background: rgba(255,255,255,0.06);
    }

    /* ===== ACTION CARDS ===== */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .action-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .action-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.1rem;
      background: none;
      border: none;
      color: var(--white);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: left;
      line-height: 1.35;
      transition: background 0.15s ease;
      min-height: 56px; /* touch target */
    }

    .action-trigger:hover {
      background: rgba(255,255,255,0.04);
    }

    .action-trigger:active {
      background: rgba(255,255,255,0.07);
    }

    .action-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
    }

    .action-icon.email { background: rgba(193,39,45,0.15); }
    .action-icon.donate { background: rgba(0,122,61,0.15); }
    .action-icon.sources { background: rgba(255,255,255,0.08); }

    .action-meta {
      flex: 1;
      min-width: 0;
    }

    .action-title {
      display: block;
    }

    .action-desc {
      display: block;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--grey);
      margin-top: 2px;
    }

    .action-chevron {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      transition: transform 0.25s ease;
      color: var(--grey);
    }

    .action-card.open .action-chevron {
      transform: rotate(180deg);
    }

    /* ===== EXPANDABLE PANEL ===== */
    .action-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    .action-panel-inner {
      padding: 0 1.1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .panel-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 0.4rem;
    }

    /* ===== LINK ITEMS ===== */
    .link-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 0.75rem;
      border-radius: 5px;
      background: rgba(255,255,255,0.03);
      color: var(--white);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.4;
      transition: background 0.15s ease;
      cursor: pointer;
      border: none;
      font-family: inherit;
      text-align: left;
      width: 100%;
      min-height: 44px; /* touch target */
    }

    .link-item:hover {
      background: rgba(255,255,255,0.07);
    }

    .link-item:active {
      background: rgba(255,255,255,0.1);
    }

    .link-arrow {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      color: var(--grey);
      margin-left: auto;
    }

    .link-item .link-prefix {
      flex-shrink: 0;
      font-size: 0.75rem;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .link-prefix.urgent {
      background: rgba(193,39,45,0.2);
      color: #e05555;
    }

    .link-prefix.org {
      background: rgba(0,122,61,0.15);
      color: #4dbd7a;
    }

    /* ===== SECTION HEADERS INSIDE PANELS ===== */
    .panel-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--grey);
      padding: 0.6rem 0 0.2rem;
    }

    .panel-section-desc {
      font-size: 0.78rem;
      color: var(--grey);
      line-height: 1.5;
      margin-bottom: 0.3rem;
    }

    /* ===== SOCIAL FOOTER ===== */
    .social-footer {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding-top: 0.5rem;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--grey);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      transition: color 0.15s ease;
    }

    .social-link:hover {
      color: var(--white);
    }

    .social-link svg {
      width: 18px;
      height: 18px;
    }

    /* ===== FLAG BAR ===== */
    .flag-bar {
      display: flex;
      height: 3px;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 0.25rem;
    }

    .flag-bar span {
      flex: 1;
    }

    .flag-bar .fb-white { background: var(--white); }
    .flag-bar .fb-green { background: var(--green); }
    .flag-bar .fb-red { background: var(--red); }

    /* ===== DESKTOP ===== */
    @media (min-width: 600px) {
      .page {
        max-width: 520px;
        padding: 3rem 2rem 4rem;
      }
      .header h1 { font-size: 2rem; }
    }
  </style>
</head>

/* ===== HELPERS ===== */
const arrowSvg = '<svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>';

function makeLink(item) {
  const a = document.createElement('a');
  a.className = 'link-item';
  a.href = item.url;
  a.target = '_blank';
  a.rel = 'noopener';
  a.innerHTML = (item.urgent ? '<span class="link-prefix urgent">!</span>' : '') + item.name + arrowSvg;
  return a;
}

function makeEmailButton(item) {
  const btn = document.createElement('button');
  btn.className = 'link-item';
  btn.type = 'button';
  btn.innerHTML = '<span class="link-prefix org">✉</span>' + item.label + arrowSvg;
  btn.addEventListener('click', () => {
    if (item.action === 'violence') sendEmail('violence');
    else if (item.action === 'chatcontrol') sendEmail('chatcontrol');
  });
  return btn;
}

function sendEmail(type) {
  const t = i18n[lang];
  let to, subject, body;

  if (type === 'violence') {
    to = recipients;
    subject = t.violenceSubject;
    body = t.violenceBody;
  } else {
    to = euroRecipients;
    subject = t.chatControlSubject;
    body = t.chatControlBody;
  }

  const chunkSize = 25;
  const encodedSubject = encodeURIComponent(subject);
  const encodedBody = encodeURIComponent(body);

  for (let i = 0; i < to.length; i += chunkSize) {
    const chunk = to.slice(i, i + chunkSize).join(',');
    const href = `mailto:${chunk}?subject=${encodedSubject}&body=${encodedBody}`;
    if (i === 0) {
      window.location.href = href;
    } else {
      setTimeout(() => {
        const a = document.createElement('a');
        a.href = href;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        a.remove();
      }, i * 50);
    }
  }
}

/* ===== ACCORDION ===== */
document.querySelectorAll('.action-trigger').forEach(trigger => {
  trigger.addEventListener('click', () => {
    const card = trigger.closest('.action-card');
    const panel = card.querySelector('.action-panel');
    const isOpen = card.classList.contains('open');

    document.querySelectorAll('.action-card.open').forEach(openCard => {
      openCard.classList.remove('open');
      const openPanel = openCard.querySelector('.action-panel');
      openPanel.style.maxHeight = null;
      openCard.querySelector('.action-trigger').setAttribute('aria-expanded', 'false');
    });

    if (!isOpen) {
      card.classList.add('open');
      panel.style.maxHeight = panel.scrollHeight + 'px';
      trigger.setAttribute('aria-expanded', 'true');
    }
  });
});

/* ===== LANGUAGE ===== */
let lang = 'nl';

function render() {
  const t = i18n[lang];

  document.documentElement.lang = lang;
  document.getElementById('email-title').textContent = t.emailTitle;
  document.getElementById('email-desc').textContent = t.emailDesc;
  document.getElementById('donate-title').textContent = t.donateTitle;
  document.getElementById('donate-desc').textContent = t.donateDesc;
  document.getElementById('sources-title').textContent = t.sourcesTitle;
  document.getElementById('sources-desc').textContent = t.sourcesDesc;

  const emailContainer = document.getElementById('email-links');
  emailContainer.innerHTML = '';
  t.emailActions.forEach(item => emailContainer.appendChild(makeEmailButton(item)));

  const donateContainer = document.getElementById('donate-links');
  donateContainer.innerHTML = '';
  t.donations.forEach(item => donateContainer.appendChild(makeLink(item)));

  const sourcesContainer = document.getElementById('sources-content');
  sourcesContainer.innerHTML = '';

  const srcTitle = document.createElement('div');
  srcTitle.className = 'panel-section-title';
  srcTitle.textContent = t.sourcesLabel;
  sourcesContainer.appendChild(srcTitle);

  const srcDesc = document.createElement('div');
  srcDesc.className = 'panel-section-desc';
  srcDesc.textContent = t.sourcesDescText;
  sourcesContainer.appendChild(srcDesc);

  t.sources.forEach(item => sourcesContainer.appendChild(makeLink(item)));

  const openPanel = document.querySelector('.action-card.open .action-panel');
  if (openPanel) {
    openPanel.style.maxHeight = openPanel.scrollHeight + 'px';
  }
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    lang = btn.dataset.lang;
    render();
  });
});

render();
</script>
