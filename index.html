i18n.nl.violenceSubject='Oproep tot staakt-het-vuren en internationale rechtsbescherming in het Midden-Oosten';
i18n.nl.violenceBody='Geachte Kamerlid,\n\nIk schrijf u om u op te roepen concrete stappen te zetten om een einde te maken aan de oorlogen in het Midden-Oosten, met name in Gaza en Libanon.\nHet aanhoudende geweld veroorzaakt enorm veel leed onder de burgerbevolking. Ik verzoek u vriendelijk om:\n\nTe pleiten voor een onmiddellijk en duurzaam staakt-het-vuren.\nVolledige onderzoeken te steunen door het Internationaal Strafhof (ICC) en andere internationale instanties naar mogelijke schendingen van het humanitair oorlogsrecht door alle betrokken partijen.\n\nIsra\u00ebl te houden aan dezelfde internationale rechtsnormen als elk ander land.\nVerdere escalatie tegen te gaan en invloed die het conflict verlengt te beperken.\n\nVeel Nederlandse burgers maken zich ernstig zorgen over de humanitaire situatie en het risico op verdere regionale destabilisatie. Nederland, als groot voorstander van de internationale rechtsorde, heeft volgens mij de plicht om consistent en onpartijdig op te treden.\n\nIk zou het op prijs stellen te vernemen wat uw standpunt is en welke stappen u concreet wilt zetten.\n\nBij voorbaat dank voor uw tijd en inzet voor ons land.\n\nMet vriendelijke groeten.';
i18n.nl.chatControlSubject='Mijn Stem TEGEN het Chat Control Wetsvoorstel';
i18n.nl.chatControlBody='Beste Europarlementari\u00ebrs van Nederland,\n\nAls bezorgde Nederlandse en Europese burger maak ik mij grote zorgen over het voorgestelde EU-wetsvoorstel inzake "Chat Control". Ik ben ernstig verontrust over de manier waarop dit voorstel de fundamentele rechten van alle burgers aantast.\n\nHet doorlichten en controleren van priv\u00e9berichten komt neer op een grootschalige inbreuk op onze persoonlijke levenssfeer en tast het recht op vertrouwelijke communicatie aan. Dit ondermijnt niet alleen de privacy van miljoenen onschuldige burgers, maar schept ook een gevaarlijk precedent voor toezicht en controle binnen de Europese Unie.\n\nIk verzoek u dringend om dit wetsvoorstel niet te steunen.';

i18n.nl.story='<h2>De moord op Hind Rajab</h2><p>Op 29 januari 2024 werd de vijfjarige Hind Rajab vermoord, samen met haar familie, door het Isra\u00eblische leger (IDF) in Gaza. Hind overleefde de eerste aanval, maar bleef gewond en alleen achter in het autowrak, omringd door de lichamen van haar familieleden.</p><p>Die dag probeerden Hind, haar vier neven en nichten, tante en oom te vluchten uit de wijk Tel al-Hawa in Gaza-Stad. Terwijl ze in hun Kia Picanto probeerden te ontkomen, opende een IDF-eenheid het vuur op hun auto. Hinds 15-jarige nicht Layan Hamada belde in paniek met de Palestijnse Rode Halve Maan (PRCS) en meldde dat ze beschoten werden, dat een tank dichterbij kwam, en dat iedereen in de auto behalve Hind en zijzelf gedood was. Seconden later klonken opnieuw schoten, en stopte Layans geschreeuw abrupt.</p><p>Hind was nu de enige overlevende. Zwaargewond en alleen, opgesloten in de auto. De PRCS bleef in contact met Hind terwijl ze probeerden toestemming te krijgen van het IDF om hulpverleners te sturen.</p><p>Een onderzoek door Forensic Architecture toonde aan dat in totaal 335 kogels op de auto werden afgevuurd, en dat de tankbemanning vrij zicht had op de twee kinderen in het voertuig. De IDF-tank stond slechts 13 tot 23 meter van de auto. In slechts 6 seconden werden 64 schoten afgevuurd op de 15-jarige Layan, terwijl ze al aan de telefoon was met de PRCS.</p><h3>De hulpverleners</h3><p>Rond 18:00 uur vertrokken PRCS-ambulancemedewerkers Yusuf al-Zeino en Ahmed al-Madhoun vanuit het Al-Ahli ziekenhuis om Hind te redden. Nadat ze op de locatie aankwamen, werd er nooit meer iets van hen vernomen. Het laatste dat werd opgenomen:</p><blockquote>"Meldkamer: Kunnen jullie de auto zien?<br>Ambulance: Ik kan hier niets zien.<br>Meldkamer: Hebben jullie de sirene en zwaailichten aan?<br>Ambulance: Alleen de lichten, niet de sirene.<br>Ambulance: ... oh, daar is hij!<br>[explosie]"</blockquote><p>Twee weken na de aanval, toen het IDF het gebied eindelijk verliet, werden de ontbindende lichamen van Hind, Layan en hun familieleden gevonden. Een paar meter verderop werd de uitgebrande ambulance gevonden, samen met de resten van de hulpverleners Yusuf en Ahmed.</p><h3>Waarom Hind Rajab een symbool werd</h3><p>Het verhaal van Hind Rajab gaat verder dan haar individuele tragedie. Het staat symbool voor de systematische wreedheid waarmee Palestijnen worden geconfronteerd. Net als duizenden kinderen die voor en na haar zijn gedood, geeft het verhaal van Hind een duidelijk beeld van de bewuste, collectieve bestraffing die Isra\u00ebl toepast op burgers, met name kinderen, en het opzettelijk aanvallen van hulpverleners.</p><p>Volgens de Conventies van Gen\u00e8ve en het Statuut van Rome waren Hind, haar familie en de twee hulpverleners allemaal slachtoffers van ernstige en complexe misdaden, waaronder meerdere zware schendingen en oorlogsmisdaden. (Euro-Med Monitor)</p><h2>Wat wij doen</h2><p>Wij brengen het verhaal van Hind Rajab naar de straten van Nederland. Onze campagne draait om een replica van de auto waarin Hind stierf, inclusief replica-kogelgaten die laten zien hoe zij haar laatste momenten heeft ervaren terwijl ze beschoten werd door Isra\u00eblische troepen. De auto is een kunstwerk met informatieve flyers en materialen die het verhaal vertellen.</p><p>We trekken door het land om bewustzijn te cre\u00ebren en mensen te informeren. Kennis is macht. We zijn niet verbonden aan een organisatie of groep. We zijn individuen die strijden tegen onrecht.</p><h3>In het nieuws</h3>';

i18n.en.violenceBody='Dear Member of Parliament,\n\nI am writing to urge you to take active steps to help stop the ongoing wars in the Middle East, particularly in Gaza and Lebanon.\nThe continuing violence has caused enormous civilian suffering. I respectfully request that you:\n\nAdvocate for an immediate and lasting ceasefire.\nSupport full investigations by the International Criminal Court and other international bodies into violations of international humanitarian law by all parties involved.\nWork to hold Israel accountable to the same international legal standards as any other country.\n\nOppose further escalation and the influence that prolongs the conflict.\nMany Dutch citizens are deeply concerned about the humanitarian situation and the risk of wider regional instability. I believe the Netherlands, as a strong supporter of international law, has a duty to act consistently and impartially.\n\nI would value knowing your position on this matter and what actions you plan to take.\n\nThank you for your time and service to the country.\n\nBest regards.';

i18n.en.chatControlBody='Dear Members of the European Parliament from the Netherlands,\n\nAs a concerned Dutch and European citizen, I am deeply worried about the proposed EU legislation on "Chat Control." I am gravely concerned about the way this proposal undermines the fundamental rights of all citizens.\n\nThe scanning and monitoring of private messages amounts to a large-scale violation of our personal privacy and infringes upon the right to confidential communication. This not only compromises the privacy of millions of innocent citizens but also sets a dangerous precedent for surveillance and control within the European Union.\n\nI urgently appeal to you not to support this proposal.';

i18n.en.story='<h2>The killing of Hind Rajab</h2><p>On January 29, 2024, five-year-old Hind Rajab was killed alongside her family by the Israeli Defense Forces (IDF) in Gaza. Hind survived the initial attack but was left wounded and alone inside the wreckage, surrounded by the bodies of her family members.</p><p>That day, Hind, her four cousins, aunt and uncle attempted to flee the Tel al-Hawa neighborhood in Gaza City. As they tried to escape in their Kia Picanto, an IDF unit opened fire on their car. Hind\'s 15-year-old cousin Layan Hamada made an urgent call to the Palestinian Red Crescent Society (PRCS), reporting they were being targeted, a tank was approaching, and everyone in the car except Hind and herself had been killed. Seconds later, gunshots rang out again, and Layan\'s screaming stopped abruptly.</p><p>Hind was now the only survivor. Severely injured and alone, trapped inside the car. The PRCS stayed in contact with Hind while attempting to get permission from the IDF to send paramedics.</p><p>An investigation by Forensic Architecture found that a total of 335 bullets were fired at the car, and that the tank crew had clear sight of the two children inside the vehicle. The IDF tank was positioned just 13 to 23 meters from the car. In just 6 seconds, 64 rounds were fired at 15-year-old Layan while she was already on the phone with the PRCS.</p><h3>The paramedics</h3><p>Around 6 PM, PRCS paramedics Yusuf al-Zeino and Ahmed al-Madhoun left Al-Ahli Hospital in an ambulance to rescue Hind. After arriving at the location, they were never heard from again. The last thing captured:</p><blockquote>"Control room: Can you see the car?<br>Ambulance: I can\'t see a thing here.<br>Control room: Do you have your siren and flashing lights on?<br>Ambulance: Just the lights, not the siren.<br>Ambulance: ... oh there it is!<br>[explosion]"</blockquote><p>Two weeks after the attack, when the IDF finally left the area, the decomposing bodies of Hind, Layan and their family members were found. A few meters away, the burned-out ambulance was discovered alongside the remains of paramedics Yusuf and Ahmed.</p><h3>Why Hind Rajab became a symbol</h3><p>Hind Rajab\'s story reaches far beyond her individual tragedy. It symbolizes the systematic cruelty Palestinians face. Like thousands of children killed before and after her, Hind\'s story gives a clear picture of the deliberate, collective punishment Israel inflicts on civilians, particularly children, and the intentional targeting of healthcare workers.</p><p>According to the Geneva Conventions and the Rome Statute, Hind, her family, and the two paramedics were all victims of serious and complex crimes including multiple grave violations and war crimes. (Euro-Med Monitor)</p><h2>What we do</h2><p>We bring the story of Hind Rajab to the streets of the Netherlands. Our campaign centers around a replica of the car in which Hind died, complete with replica bullet holes showing how she experienced her final moments as she was shot at by Israeli forces. The car is an art installation covered with informational flyers and materials that tell the story.</p><p>We travel across the country to raise awareness and educate people. Knowledge is power. We are not tied to any organization or group. We are individuals fighting against injustice.</p><h3>In the news</h3>';

i18n.fr.violenceBody='Cher(e) Membre du Parlement,\n\nJe vous \u00e9cris pour vous demander de prendre des mesures actives afin de contribuer \u00e0 mettre fin aux guerres en cours au Moyen-Orient, en particulier \u00e0 Gaza et au Liban.\nLa violence persistante a caus\u00e9 d\u2019\u00e9normes souffrances parmi la population civile. Je vous demande respectueusement de :\n\nPlaider pour un cessez-le-feu imm\u00e9diat et durable.\nSoutenir des enqu\u00eates compl\u00e8tes par la Cour P\u00e9nale Internationale et d\u2019autres instances internationales sur les violations du droit international humanitaire par toutes les parties impliqu\u00e9es.\nVeiller \u00e0 ce qu\u2019Isra\u00ebl soit tenu aux m\u00eames normes juridiques internationales que tout autre pays.\n\nS\u2019opposer \u00e0 toute escalade et \u00e0 l\u2019influence qui prolonge le conflit.\nDe nombreux citoyens n\u00e9erlandais sont profond\u00e9ment pr\u00e9occup\u00e9s par la situation humanitaire et le risque d\u2019instabilit\u00e9 r\u00e9gionale. Je crois que les Pays-Bas, en tant que d\u00e9fenseur du droit international, ont le devoir d\u2019agir de mani\u00e8re coh\u00e9rente et impartiale.\n\nJ\u2019appr\u00e9cierais de conna\u00eetre votre position sur ce sujet et les mesures que vous comptez prendre.\n\nMerci pour votre temps et votre service.\n\nCordialement.';
i18n.fr.chatControlSubject='Mon opposition au projet de loi \u00ab Chat Control \u00bb';
i18n.fr.chatControlBody='Chers Membres du Parlement Europ\u00e9en des Pays-Bas,\n\nEn tant que citoyen(ne) europ\u00e9en(ne) et n\u00e9erlandais(e) pr\u00e9occup\u00e9(e), je m\u2019inqui\u00e8te profond\u00e9ment du projet de l\u00e9gislation europ\u00e9enne \u00ab Chat Control \u00bb. Ce projet porte gravement atteinte aux droits fondamentaux de tous les citoyens.\n\nLa surveillance et le contr\u00f4le des messages priv\u00e9s constituent une violation massive de notre vie priv\u00e9e et du droit \u00e0 la communication confidentielle. Cela compromet non seulement la vie priv\u00e9e de millions de citoyens innocents, mais cr\u00e9e \u00e9galement un dangereux pr\u00e9c\u00e9dent pour la surveillance au sein de l\u2019Union Europ\u00e9enne.\n\nJe vous demande instamment de ne pas soutenir cette proposition.';

i18n.fr.story='<h2>Le meurtre de Hind Rajab</h2><p>Le 29 janvier 2024, Hind Rajab, cinq ans, a \u00e9t\u00e9 tu\u00e9e avec sa famille par les Forces de D\u00e9fense Isra\u00e9liennes (FDI) \u00e0 Gaza. Hind a surv\u00e9cu \u00e0 l\'attaque initiale mais est rest\u00e9e bless\u00e9e et seule dans l\'\u00e9pave, entour\u00e9e des corps de ses proches.</p><p>Ce jour-l\u00e0, Hind, ses quatre cousins, sa tante et son oncle tentaient de fuir le quartier de Tel al-Hawa \u00e0 Gaza. Alors qu\'ils essayaient de s\'\u00e9chapper dans leur Kia Picanto, une unit\u00e9 des FDI a ouvert le feu sur leur voiture. La cousine de Hind, Layan Hamada, 15 ans, a appel\u00e9 en urgence le Croissant-Rouge Palestinien (PRCS), signalant qu\'ils \u00e9taient vis\u00e9s, qu\'un char approchait et que tout le monde dans la voiture sauf Hind et elle avait \u00e9t\u00e9 tu\u00e9. Quelques secondes plus tard, des coups de feu ont retenti de nouveau, et les cris de Layan se sont arr\u00eat\u00e9s brusquement.</p><p>Hind \u00e9tait d\u00e9sormais la seule survivante. Gravement bless\u00e9e et seule, pi\u00e9g\u00e9e dans la voiture. Le PRCS est rest\u00e9 en contact avec Hind tout en tentant d\'obtenir l\'autorisation des FDI pour envoyer des secours.</p><p>Une enqu\u00eate de Forensic Architecture a r\u00e9v\u00e9l\u00e9 qu\'un total de 335 balles avaient \u00e9t\u00e9 tir\u00e9es sur la voiture, et que l\'\u00e9quipage du char avait une vue d\u00e9gag\u00e9e sur les deux enfants. Le char \u00e9tait \u00e0 seulement 13 \u00e0 23 m\u00e8tres de la voiture. En seulement 6 secondes, 64 tirs ont \u00e9t\u00e9 effectu\u00e9s sur Layan, 15 ans, alors qu\'elle \u00e9tait d\u00e9j\u00e0 au t\u00e9l\u00e9phone avec le PRCS.</p><h3>Les secouristes</h3><p>Vers 18h, les ambulanciers du PRCS Yusuf al-Zeino et Ahmed al-Madhoun ont quitt\u00e9 l\'h\u00f4pital Al-Ahli en ambulance pour sauver Hind. Apr\u00e8s leur arriv\u00e9e, on n\'a plus jamais entendu parler d\'eux. Le dernier enregistrement :</p><blockquote>"Salle de contr\u00f4le : Vous voyez la voiture ?<br>Ambulance : Je ne vois rien ici.<br>Salle de contr\u00f4le : Vous avez la sir\u00e8ne et les gyrophares allum\u00e9s ?<br>Ambulance : Juste les lumi\u00e8res, pas la sir\u00e8ne.<br>Ambulance : ... oh la voil\u00e0 !<br>[explosion]"</blockquote><p>Deux semaines apr\u00e8s l\'attaque, les corps en d\u00e9composition de Hind, Layan et leurs proches ont \u00e9t\u00e9 retrouv\u00e9s. \u00c0 quelques m\u00e8tres, l\'ambulance calcin\u00e9e a \u00e9t\u00e9 d\u00e9couverte avec les restes des secouristes Yusuf et Ahmed.</p><h3>Pourquoi Hind Rajab est devenue un symbole</h3><p>L\'histoire de Hind d\u00e9passe sa trag\u00e9die individuelle. Elle symbolise la cruaut\u00e9 syst\u00e9matique \u00e0 laquelle les Palestiniens sont confront\u00e9s. Comme des milliers d\'enfants tu\u00e9s avant et apr\u00e8s elle, l\'histoire de Hind donne une image claire de la punition collective d\u00e9lib\u00e9r\u00e9e qu\'Isra\u00ebl inflige aux civils et du ciblage intentionnel des personnels de sant\u00e9.</p><p>Selon les Conventions de Gen\u00e8ve et le Statut de Rome, Hind, sa famille et les deux secouristes \u00e9taient tous victimes de crimes graves comprenant de multiples violations et crimes de guerre. (Euro-Med Monitor)</p><h2>Ce que nous faisons</h2><p>Nous apportons l\'histoire de Hind Rajab dans les rues des Pays-Bas. Notre campagne est centr\u00e9e autour d\'une r\u00e9plique de la voiture dans laquelle Hind est morte, avec des r\u00e9pliques d\'impacts de balles montrant comment elle a v\u00e9cu ses derniers instants sous le feu des forces isra\u00e9liennes. La voiture est une installation artistique couverte de flyers informatifs.</p><p>Nous parcourons le pays pour sensibiliser et informer. Le savoir est un pouvoir. Nous ne sommes li\u00e9s \u00e0 aucune organisation. Nous sommes des individus qui luttent contre l\'injustice.</p><h3>Dans les m\u00e9dias</h3>';

  html+=item.name+chevronSvg+'</div>';
  if(item.desc)html+='<div class="link-desc">'+item.desc+'</div>';
  a.innerHTML=html;return a;
}
function makeEmailButton(item){
  var btn=document.createElement('button');btn.className='link-item';btn.type='button';
  var html='<div class="link-name"><span class="link-prefix org">\u2709</span>'+item.label+chevronSvg+'</div>';
  if(item.desc)html+='<div class="link-desc">'+item.desc+'</div>';
  btn.innerHTML=html;
  btn.addEventListener('click',function(){sendEmail(item.action==='violence'?'violence':'chatcontrol')});
  return btn;
}
function sendEmail(type){
  var t=i18n[lang];
  var to=type==='violence'?recipients:euroRecipients;
  var subject=type==='violence'?t.violenceSubject:t.chatControlSubject;
  var body=type==='violence'?t.violenceBody:t.chatControlBody;
  var es=encodeURIComponent(subject),eb=encodeURIComponent(body);
  for(var i=0;i<to.length;i+=25){
    var chunk=to.slice(i,i+25).join(',');
    var href='mailto:'+chunk+'?subject='+es+'&body='+eb;
    if(i===0){window.location.href=href}
    else{(function(h,d){setTimeout(function(){var a=document.createElement('a');a.href=h;a.style.display='none';document.body.appendChild(a);a.click();a.remove()},d)})(href,i*50)}
  }
}

/* ===== VIEW NAVIGATION ===== */
function showView(id){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
document.querySelectorAll('[data-view]').forEach(function(el){
  el.addEventListener('click',function(){showView(el.dataset.view)});
});

/* ===== LANGUAGE ===== */
var lang='nl';
function render(){
  var t=i18n[lang];
  document.documentElement.lang=lang;
  document.getElementById('hero-label').textContent=t.heroLabel;
  document.getElementById('email-label').textContent=t.emailLabel;
  document.getElementById('donate-label').textContent=t.donateLabel;
  document.getElementById('sources-label').textContent=t.sourcesLabel;
  document.querySelectorAll('.back-text').forEach(function(s){s.textContent=t.back});
  document.getElementById('email-title').textContent=t.emailTitle;
  document.getElementById('email-desc').textContent=t.emailDesc;
  document.getElementById('donate-title').textContent=t.donateTitle;
  document.getElementById('donate-desc').textContent=t.donateDesc;
  document.getElementById('sources-title').textContent=t.sourcesTitle;
  document.getElementById('sources-desc').textContent=t.sourcesDesc;

  var ec=document.getElementById('email-links');ec.innerHTML='';
  t.emailActions.forEach(function(item){ec.appendChild(makeEmailButton(item))});
  var dc=document.getElementById('donate-links');dc.innerHTML='';
  t.donations.forEach(function(item){dc.appendChild(makeLink(item))});
  var sc=document.getElementById('sources-links');sc.innerHTML='';
  t.sources.forEach(function(item){sc.appendChild(makeLink(item))});

  var storyHtml=t.story;
  t.newsLinks.forEach(function(nl){
    storyHtml+='<a class="link-item" href="'+nl.url+'" target="_blank" rel="noopener"><div class="link-name">'+nl.name+chevronSvg+'</div><div class="link-desc">'+nl.desc+'</div></a>';
  });
  storyHtml+='<div class="story-source">Bron: <a href="https://hindrajabfoundation.org" target="_blank" rel="noopener">'+t.storySource+'</a></div>';
  document.getElementById('story-content').innerHTML=storyHtml;
}

document.querySelectorAll('.lang-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');lang=btn.dataset.lang;render();
  });
});
render();

</script>
