<html lang="nl">
<head>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#0a0a0a;--white:#f0f0ec;--green:#007a3d;--red:#c1272d;--grey:#8a8a8a;--card-bg:rgba(16,16,16,0.85);--border:rgba(255,255,255,0.08);--radius:6px}
    html{scroll-behavior:smooth}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--black);color:var(--white);min-height:100vh;min-height:100dvh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased}
    body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:url('gaza.jpg') center/cover no-repeat;opacity:0.18}
    body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(180deg,rgba(10,10,10,0.85) 0%,rgba(0,122,61,0.08) 50%,rgba(193,39,45,0.1) 100%)}
    .page{position:relative;z-index:1;width:100%;max-width:480px;padding:1.5rem 1.25rem 3rem;display:flex;flex-direction:column;gap:1.25rem}
    .view{display:none;flex-direction:column;gap:1rem}.view.active{display:flex}

    /* Top bar: lang + share */
    .top-bar{display:flex;align-items:center;justify-content:center;gap:0.6rem}
    .lang-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:100px;overflow:hidden}
    .lang-btn{background:transparent;border:none;color:var(--grey);font-size:0.8rem;font-weight:600;padding:0.45rem 0.85rem;cursor:pointer;transition:all 0.2s ease;font-family:inherit;display:flex;align-items:center;gap:0.35rem}
    .lang-btn .flag-img{width:16px;height:12px;border-radius:1px;object-fit:cover}
    .lang-btn.active{background:var(--white);color:var(--black)}
    .lang-btn:not(.active):hover{background:rgba(255,255,255,0.06)}
    .share-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--grey);cursor:pointer;transition:all 0.15s ease;flex-shrink:0}
    .share-btn:hover{background:rgba(255,255,255,0.06);color:var(--white)}
    .share-btn svg{width:16px;height:16px}
    .share-toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:0.5rem 1.2rem;border-radius:100px;font-size:0.8rem;font-weight:600;z-index:99;opacity:0;transition:opacity 0.3s ease;pointer-events:none}
    .share-toast.show{opacity:1}

    /* Hero */
    .hero-card{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .hero-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
    .hero-btn{width:100%;padding:0.85rem 1rem;background:none;border:none;border-top:1px solid var(--border);color:var(--white);font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:0.6rem;transition:background 0.15s ease;text-align:left;min-height:48px}
    .hero-btn:hover{background:rgba(255,255,255,0.04)}.hero-btn:active{background:rgba(255,255,255,0.07)}
    .hero-btn svg{flex-shrink:0;width:18px;height:18px;color:var(--grey);margin-left:auto}
    .flag-bar{display:flex;height:3px;border-radius:2px;overflow:hidden}.flag-bar span{flex:1}
    .fb-black{background:#1a1a1a}.fb-white{background:var(--white)}.fb-green{background:var(--green)}.fb-red{background:var(--red)}

    /* Action row */
    .action-row{display:flex;gap:0.6rem}
    .action-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.4rem;padding:1rem 0.5rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--white);font-family:inherit;cursor:pointer;transition:background 0.15s ease;min-height:56px;text-decoration:none}
    .action-btn:hover{background:rgba(255,255,255,0.04)}.action-btn:active{background:rgba(255,255,255,0.07)}
    .action-btn .action-icon{font-size:1.3rem;line-height:1}.action-btn .action-label{font-size:0.8rem;font-weight:600;text-align:center}

    /* Sources accordion (on main page) */
    .accordion{border-radius:var(--radius);border:1px solid var(--border);background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);overflow:hidden}
    .accordion-trigger{width:100%;display:flex;align-items:center;gap:0.75rem;padding:0.85rem 1.1rem;background:none;border:none;color:var(--white);font-family:inherit;font-size:0.88rem;font-weight:600;cursor:pointer;transition:background 0.15s ease;min-height:48px;text-align:left}
    .accordion-trigger:hover{background:rgba(255,255,255,0.04)}
    .accordion-trigger svg{flex-shrink:0;width:18px;height:18px;color:var(--grey);margin-left:auto;transition:transform 0.25s ease}
    .accordion.open .accordion-trigger svg{transform:rotate(180deg)}
    .accordion-panel{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
    .accordion-inner{padding:0 1.1rem 1rem;display:flex;flex-direction:column;gap:0.5rem}
    .acc-divider{height:1px;background:var(--border);margin-bottom:0.3rem}

    /* Back button */
    .back-btn{display:inline-flex;align-items:center;gap:0.4rem;background:none;border:1px solid var(--border);border-radius:100px;color:var(--white);font-family:inherit;font-size:0.8rem;font-weight:600;padding:0.45rem 0.9rem 0.45rem 0.65rem;cursor:pointer;transition:all 0.15s ease;align-self:flex-start}
    .back-btn:hover{background:rgba(255,255,255,0.06)}.back-btn svg{width:16px;height:16px}
    .sub-title{font-size:1.1rem;font-weight:700;line-height:1.3}
    .sub-desc{font-size:0.82rem;color:var(--grey);line-height:1.5}

    /* Links */
    .link-item{display:flex;flex-direction:column;gap:0.2rem;padding:0.7rem 0.75rem;border-radius:5px;background:rgba(255,255,255,0.03);color:var(--white);text-decoration:none;font-size:0.82rem;font-weight:500;line-height:1.4;transition:background 0.15s ease;cursor:pointer;border:none;font-family:inherit;text-align:left;width:100%;min-height:44px}
    .link-item:hover{background:rgba(255,255,255,0.07)}.link-item:active{background:rgba(255,255,255,0.1)}
    .link-item .link-name{display:flex;align-items:center;gap:0.5rem}
    .link-item .link-desc{font-size:0.75rem;color:var(--grey);font-weight:400}
    .link-arrow{flex-shrink:0;width:14px;height:14px;color:var(--grey);margin-left:auto}
    .link-prefix{flex-shrink:0;font-size:0.7rem;padding:0.12rem 0.35rem;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
    .link-prefix.urgent{background:rgba(193,39,45,0.2);color:#e05555}
    .link-prefix.org{background:rgba(0,122,61,0.15);color:#4dbd7a}
    .links-list{display:flex;flex-direction:column;gap:0.5rem}

    /* Story */
    .story-content{font-size:0.85rem;line-height:1.7;color:var(--white)}
    .story-content p{margin-bottom:1rem}
    .story-content blockquote{border-left:3px solid var(--green);padding:0.6rem 0.8rem;margin:1rem 0;background:rgba(255,255,255,0.03);border-radius:0 4px 4px 0;font-style:italic;font-size:0.82rem;color:var(--grey)}
    .story-content h2{font-size:1rem;font-weight:700;margin:1.5rem 0 0.5rem;color:var(--white)}
    .story-content h3{font-size:0.9rem;font-weight:700;margin:1.2rem 0 0.4rem;color:var(--white)}
    .story-source{font-size:0.75rem;color:var(--grey);margin:1rem 0;padding:0.5rem 0;border-top:1px solid var(--border)}.story-source a{color:var(--grey);text-decoration:underline}

    /* Chat transcript */
    .chat-transcript{display:flex;flex-direction:column;gap:0.4rem;margin:1rem 0;padding:0.8rem;background:rgba(255,255,255,0.02);border-radius:var(--radius);border:1px solid var(--border)}
    .chat-line{font-size:0.8rem;line-height:1.5;padding:0.35rem 0.6rem;border-radius:6px;max-width:88%}
    .chat-line.control{background:rgba(0,122,61,0.12);color:var(--white);align-self:flex-start}
    .chat-line.ambulance{background:rgba(255,255,255,0.06);color:var(--white);align-self:flex-end}
    .chat-line.event{text-align:center;color:var(--red);font-weight:700;font-size:0.78rem;align-self:center;padding:0.5rem}
    .chat-label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--grey);margin-bottom:0.1rem}

    /* YT button */
    .yt-btn{display:flex;align-items:center;gap:0.6rem;padding:0.7rem 0.85rem;border-radius:5px;background:rgba(193,39,45,0.1);border:1px solid rgba(193,39,45,0.2);color:var(--white);text-decoration:none;font-size:0.82rem;font-weight:600;transition:background 0.15s ease;margin:0.8rem 0}
    .yt-btn:hover{background:rgba(193,39,45,0.18)}
    .yt-icon{width:20px;height:20px;flex-shrink:0;color:var(--red)}

    .social-footer{display:flex;justify-content:center;padding-top:0.5rem}
    .social-link{display:flex;align-items:center;gap:0.4rem;color:var(--grey);text-decoration:none;font-size:0.8rem;font-weight:600;transition:color 0.15s ease}
    .social-link:hover{color:var(--white)}.social-link svg{width:18px;height:18px}
    @media(min-width:600px){.page{max-width:520px;padding:2rem 2rem 4rem}}
  </style>
</head>

D.nl.violenceSubject='Oproep tot staakt-het-vuren en internationale rechtsbescherming in het Midden-Oosten';
D.nl.violenceBody='Geachte Kamerlid,\n\nIk schrijf u om u op te roepen concrete stappen te zetten om een einde te maken aan de oorlogen in het Midden-Oosten, met name in Gaza en Libanon.\nHet aanhoudende geweld veroorzaakt enorm veel leed onder de burgerbevolking. Ik verzoek u vriendelijk om:\n\nTe pleiten voor een onmiddellijk en duurzaam staakt-het-vuren.\nVolledige onderzoeken te steunen door het Internationaal Strafhof (ICC) en andere internationale instanties naar mogelijke schendingen van het humanitair oorlogsrecht door alle betrokken partijen.\n\nIsra\u00ebl te houden aan dezelfde internationale rechtsnormen als elk ander land.\nVerdere escalatie tegen te gaan en invloed die het conflict verlengt te beperken.\n\nVeel Nederlandse burgers maken zich ernstig zorgen over de humanitaire situatie en het risico op verdere regionale destabilisatie. Nederland, als groot voorstander van de internationale rechtsorde, heeft volgens mij de plicht om consistent en onpartijdig op te treden.\n\nIk zou het op prijs stellen te vernemen wat uw standpunt is en welke stappen u concreet wilt zetten.\n\nBij voorbaat dank voor uw tijd en inzet voor ons land.\n\nMet vriendelijke groeten.';

D.nl.chatControlBody='Beste Europarlementari\u00ebrs van Nederland,\n\nAls bezorgde Nederlandse en Europese burger maak ik mij grote zorgen over het voorgestelde EU-wetsvoorstel inzake "Chat Control". Ik ben ernstig verontrust over de manier waarop dit voorstel de fundamentele rechten van alle burgers aantast.\n\nHet doorlichten en controleren van priv\u00e9berichten komt neer op een grootschalige inbreuk op onze persoonlijke levenssfeer en tast het recht op vertrouwelijke communicatie aan. Dit ondermijnt niet alleen de privacy van miljoenen onschuldige burgers, maar schept ook een gevaarlijk precedent voor toezicht en controle binnen de Europese Unie.\n\nIk verzoek u dringend om dit wetsvoorstel niet te steunen.';

D.nl.ytLabel='Luister naar Hind Rajab\u2019s laatste woorden';
D.nl.story='<h2>De moord op Hind Rajab</h2><p>Op 29 januari 2024 werd de vijfjarige Hind Rajab vermoord, samen met haar familie, door het Isra\u00eblische leger (IDF) in Gaza. Hind overleefde de eerste aanval, maar bleef gewond en alleen achter in het autowrak, omringd door de lichamen van haar familieleden.</p><p>Die dag probeerden Hind, haar vier neven en nichten, tante en oom te vluchten uit de wijk Tel al-Hawa in Gaza-Stad. Terwijl ze in hun Kia Picanto probeerden te ontkomen, opende een IDF-eenheid het vuur op hun auto. Hinds 15-jarige nicht Layan Hamada belde in paniek met de Palestijnse Rode Halve Maan (PRCS) en meldde dat ze beschoten werden, dat een tank dichterbij kwam, en dat iedereen in de auto behalve Hind en zijzelf gedood was. Seconden later klonken opnieuw schoten, en stopte Layans geschreeuw abrupt.</p><p>Hind was nu de enige overlevende. Zwaargewond en alleen, opgesloten in de auto. De PRCS bleef in contact met Hind terwijl ze probeerden toestemming te krijgen van het IDF om hulpverleners te sturen.</p><p>Een onderzoek door Forensic Architecture toonde aan dat in totaal 335 kogels op de auto werden afgevuurd, en dat de tankbemanning vrij zicht had op de twee kinderen in het voertuig. De IDF-tank stond slechts 13 tot 23 meter van de auto. In slechts 6 seconden werden 64 schoten afgevuurd op de 15-jarige Layan, terwijl ze al aan de telefoon was met de PRCS.</p>{{YT}}<h3>De hulpverleners</h3><p>Rond 18:00 uur vertrokken PRCS-ambulancemedewerkers Yusuf al-Zeino en Ahmed al-Madhoun vanuit het Al-Ahli ziekenhuis om Hind te redden. Nadat ze op de locatie aankwamen, werd er nooit meer iets van hen vernomen. Het laatste dat werd opgenomen:</p>{{CHAT}}<p>Twee weken na de aanval, toen het IDF het gebied eindelijk verliet, werden de ontbindende lichamen van Hind, Layan en hun familieleden gevonden. Een paar meter verderop werd de uitgebrande ambulance gevonden, samen met de resten van de hulpverleners Yusuf en Ahmed.</p><h3>Waarom Hind Rajab een symbool werd</h3><p>Het verhaal van Hind Rajab gaat verder dan haar individuele tragedie. Het staat symbool voor de systematische wreedheid waarmee Palestijnen worden geconfronteerd. Net als duizenden kinderen die voor en na haar zijn gedood, geeft het verhaal van Hind een duidelijk beeld van de bewuste, collectieve bestraffing die Isra\u00ebl toepast op burgers, met name kinderen, en het opzettelijk aanvallen van hulpverleners.</p><p>Volgens de Conventies van Gen\u00e8ve en het Statuut van Rome waren Hind, haar familie en de twee hulpverleners allemaal slachtoffers van ernstige en complexe misdaden, waaronder meerdere zware schendingen en oorlogsmisdaden. (Euro-Med Monitor)</p>{{SOURCE}}<h2>Wat wij doen</h2><p>Hind Rajab is het verhaal dat de wereld kent. Maar zij is niet alleen. Zij staat voor elk kind dat is gedood door de Isra\u00eblische strijdkrachten. Elk kind dat nooit meer thuiskwam. Elk kind wiens naam nooit in het nieuws verscheen. Wij weigeren te accepteren dat hun verhalen worden vergeten.</p><p>Daarom brengen wij het verhaal van Hind naar de straten van Nederland. In het hart van onze campagne staat een replica van de auto waarin Hind stierf. De auto is doorboord met replica-kogelgaten, geplaatst zoals de werkelijke inslagen, zodat je kunt zien hoe een vijfjarig meisje haar laatste momenten heeft meegemaakt onder Isra\u00eblisch vuur. Op de auto staan flyers en informatiematerialen die het verhaal vertellen aan voorbijgangers.</p><p>We trekken van stad naar stad. Niet namens een organisatie. Niet namens een politieke partij. Wij zijn gewone mensen die vinden dat onrecht niet onbesproken mag blijven. Kennis is macht, en stilte is medeplichtigheid.</p><h3>In het nieuws</h3>';

D.en.violenceBody='Dear Member of Parliament,\n\nI am writing to urge you to take active steps to help stop the ongoing wars in the Middle East, particularly in Gaza and Lebanon.\nThe continuing violence has caused enormous civilian suffering. I respectfully request that you:\n\nAdvocate for an immediate and lasting ceasefire.\nSupport full investigations by the International Criminal Court and other international bodies into violations of international humanitarian law by all parties involved.\nWork to hold Israel accountable to the same international legal standards as any other country.\n\nOppose further escalation and the influence that prolongs the conflict.\nMany Dutch citizens are deeply concerned about the humanitarian situation and the risk of wider regional instability. I believe the Netherlands, as a strong supporter of international law, has a duty to act consistently and impartially.\n\nI would value knowing your position on this matter and what actions you plan to take.\n\nThank you for your time and service to the country.\n\nBest regards.';
D.en.chatControlSubject='My Voice AGAINST the Chat Control Legislative Bill';
D.en.chatControlBody='Dear Members of the European Parliament from the Netherlands,\n\nAs a concerned Dutch and European citizen, I am deeply worried about the proposed EU legislation on "Chat Control." I am gravely concerned about the way this proposal undermines the fundamental rights of all citizens.\n\nThe scanning and monitoring of private messages amounts to a large-scale violation of our personal privacy and infringes upon the right to confidential communication. This not only compromises the privacy of millions of innocent citizens but also sets a dangerous precedent for surveillance and control within the European Union.\n\nI urgently appeal to you not to support this proposal.';

D.en.story='<h2>The killing of Hind Rajab</h2><p>On January 29, 2024, five-year-old Hind Rajab was killed alongside her family by the Israeli Defense Forces (IDF) in Gaza. Hind survived the initial attack but was left wounded and alone inside the wreckage, surrounded by the bodies of her family members.</p><p>That day, Hind, her four cousins, aunt and uncle attempted to flee the Tel al-Hawa neighborhood in Gaza City. As they tried to escape in their Kia Picanto, an IDF unit opened fire on their car. Hind\'s 15-year-old cousin Layan Hamada made an urgent call to the Palestinian Red Crescent Society (PRCS), reporting they were being targeted, a tank was approaching, and everyone in the car except Hind and herself had been killed. Seconds later, gunshots rang out again, and Layan\'s screaming stopped abruptly.</p><p>Hind was now the only survivor. Severely injured and alone, trapped inside the car. The PRCS stayed in contact with Hind while attempting to get permission from the IDF to send paramedics.</p><p>An investigation by Forensic Architecture found that a total of 335 bullets were fired at the car, and that the tank crew had clear sight of the two children inside the vehicle. The IDF tank was positioned just 13 to 23 meters from the car. In just 6 seconds, 64 rounds were fired at 15-year-old Layan while she was already on the phone with the PRCS.</p>{{YT}}<h3>The paramedics</h3><p>Around 6 PM, PRCS paramedics Yusuf al-Zeino and Ahmed al-Madhoun left Al-Ahli Hospital in an ambulance to rescue Hind. After arriving at the location, they were never heard from again. The last thing captured:</p>{{CHAT}}<p>Two weeks after the attack, when the IDF finally left the area, the decomposing bodies of Hind, Layan and their family members were found. A few meters away, the burned-out ambulance was discovered alongside the remains of paramedics Yusuf and Ahmed.</p><h3>Why Hind Rajab became a symbol</h3><p>Hind Rajab\'s story reaches far beyond her individual tragedy. It symbolizes the systematic cruelty Palestinians face. Like thousands of children killed before and after her, Hind\'s story gives a clear picture of the deliberate, collective punishment Israel inflicts on civilians, particularly children, and the intentional targeting of healthcare workers.</p><p>According to the Geneva Conventions and the Rome Statute, Hind, her family, and the two paramedics were all victims of serious and complex crimes including multiple grave violations and war crimes. (Euro-Med Monitor)</p>{{SOURCE}}<h2>What we do</h2><p>Hind Rajab is the story the world came to know. But she is not alone. She stands for every child killed by Israeli forces. Every child who never came home. Every child whose name never made the news. We refuse to let their stories be forgotten.</p><p>That is why we bring Hind\'s story to the streets of the Netherlands. At the heart of our campaign is a replica of the car in which Hind died. The car is pierced with replica bullet holes, placed exactly as the real impacts were, so that you can see how a five-year-old girl experienced her final moments under Israeli fire. The car is covered with flyers and informational materials that tell the story to anyone passing by.</p><p>We go from city to city. Not on behalf of any organization. Not on behalf of any political party. We are ordinary people who believe that injustice must not go unspoken. Knowledge is power, and silence is complicity.</p><h3>In the news</h3>';

D.fr.violenceSubject='Appel au cessez-le-feu et au respect du droit international au Moyen-Orient';
D.fr.violenceBody='Cher(e) Membre du Parlement,\n\nJe vous \u00e9cris pour vous demander de prendre des mesures actives afin de contribuer \u00e0 mettre fin aux guerres en cours au Moyen-Orient, en particulier \u00e0 Gaza et au Liban.\nLa violence persistante a caus\u00e9 d\u2019\u00e9normes souffrances parmi la population civile. Je vous demande respectueusement de :\n\nPlaider pour un cessez-le-feu imm\u00e9diat et durable.\nSoutenir des enqu\u00eates compl\u00e8tes par la Cour P\u00e9nale Internationale et d\u2019autres instances internationales sur les violations du droit international humanitaire par toutes les parties impliqu\u00e9es.\nVeiller \u00e0 ce qu\u2019Isra\u00ebl soit tenu aux m\u00eames normes juridiques internationales que tout autre pays.\n\nS\u2019opposer \u00e0 toute escalade et \u00e0 l\u2019influence qui prolonge le conflit.\n\nJ\u2019appr\u00e9cierais de conna\u00eetre votre position sur ce sujet et les mesures que vous comptez prendre.\n\nCordialement.';
D.fr.chatControlSubject='Mon opposition au projet de loi \u00ab Chat Control \u00bb';
D.fr.chatControlBody='Chers Membres du Parlement Europ\u00e9en des Pays-Bas,\n\nEn tant que citoyen(ne) pr\u00e9occup\u00e9(e), je m\u2019inqui\u00e8te profond\u00e9ment du projet de l\u00e9gislation europ\u00e9enne \u00ab Chat Control \u00bb. Ce projet porte gravement atteinte aux droits fondamentaux de tous les citoyens.\n\nLa surveillance des messages priv\u00e9s constitue une violation massive de notre vie priv\u00e9e. Cela cr\u00e9e un dangereux pr\u00e9c\u00e9dent pour la surveillance au sein de l\u2019UE.\n\nJe vous demande instamment de ne pas soutenir cette proposition.';

D.fr.story='<h2>Le meurtre de Hind Rajab</h2><p>Le 29 janvier 2024, Hind Rajab, cinq ans, a \u00e9t\u00e9 tu\u00e9e avec sa famille par les Forces de D\u00e9fense Isra\u00e9liennes (FDI) \u00e0 Gaza. Hind a surv\u00e9cu \u00e0 l\'attaque initiale mais est rest\u00e9e bless\u00e9e et seule, entour\u00e9e des corps de ses proches.</p><p>Ce jour-l\u00e0, Hind, ses quatre cousins, sa tante et son oncle tentaient de fuir le quartier de Tel al-Hawa. Alors qu\'ils s\'\u00e9chappaient dans leur Kia Picanto, une unit\u00e9 des FDI a ouvert le feu. La cousine de Hind, Layan Hamada, 15 ans, a appel\u00e9 le Croissant-Rouge Palestinien (PRCS), signalant qu\'ils \u00e9taient vis\u00e9s, qu\'un char approchait et que tout le monde sauf Hind et elle avait \u00e9t\u00e9 tu\u00e9. Quelques secondes plus tard, les cris de Layan se sont arr\u00eat\u00e9s.</p><p>Hind \u00e9tait d\u00e9sormais la seule survivante. Gravement bless\u00e9e, pi\u00e9g\u00e9e dans la voiture.</p><p>Une enqu\u00eate de Forensic Architecture a r\u00e9v\u00e9l\u00e9 que 335 balles avaient \u00e9t\u00e9 tir\u00e9es sur la voiture. L\'\u00e9quipage du char avait une vue d\u00e9gag\u00e9e sur les deux enfants. Le char \u00e9tait \u00e0 13-23 m\u00e8tres. En 6 secondes, 64 tirs sur Layan, 15 ans.</p>{{YT}}<h3>Les secouristes</h3><p>Vers 18h, les ambulanciers Yusuf al-Zeino et Ahmed al-Madhoun sont partis sauver Hind. Apr\u00e8s leur arriv\u00e9e, on n\'a plus entendu parler d\'eux :</p>{{CHAT}}<p>Deux semaines plus tard, les corps de Hind, Layan et leurs proches ont \u00e9t\u00e9 retrouv\u00e9s. L\'ambulance calcin\u00e9e a \u00e9t\u00e9 d\u00e9couverte avec les restes de Yusuf et Ahmed.</p><h3>Pourquoi Hind Rajab est devenue un symbole</h3><p>L\'histoire de Hind d\u00e9passe sa trag\u00e9die. Elle symbolise la cruaut\u00e9 syst\u00e9matique envers les Palestiniens et le ciblage d\u00e9lib\u00e9r\u00e9 des enfants et des soignants par Isra\u00ebl.</p><p>Selon les Conventions de Gen\u00e8ve et le Statut de Rome, tous \u00e9taient victimes de crimes de guerre. (Euro-Med Monitor)</p>{{SOURCE}}<h2>Ce que nous faisons</h2><p>Hind Rajab est l\'histoire que le monde conna\u00eet. Mais elle n\'est pas seule. Elle repr\u00e9sente chaque enfant tu\u00e9 par les forces isra\u00e9liennes. Chaque enfant qui n\'est jamais rentr\u00e9. Chaque enfant dont le nom n\'a jamais fait les nouvelles. Nous refusons que leurs histoires soient oubli\u00e9es.</p><p>C\'est pourquoi nous amenons l\'histoire de Hind dans les rues des Pays-Bas. Au c\u0153ur de notre campagne : une r\u00e9plique de la voiture dans laquelle Hind est morte, perc\u00e9e d\'impacts de balles reproduisant les vrais, pour montrer ce qu\'une fillette de cinq ans a v\u00e9cu sous le feu isra\u00e9lien. L\'installation est couverte de flyers informatifs.</p><p>Nous allons de ville en ville. Sans organisation, sans parti politique. Nous sommes des individus qui croient que l\'injustice ne doit pas rester silencieuse. Le savoir est un pouvoir, et le silence est complicit\u00e9.</p><h3>Dans les m\u00e9dias</h3>';

  document.getElementById('sources-label').textContent=t.sourcesLabel;
  document.querySelectorAll('.back-text').forEach(function(s){s.textContent=t.back});
  document.getElementById('email-title').textContent=t.emailTitle;
  document.getElementById('email-desc').textContent=t.emailDesc;
  document.getElementById('donate-title').textContent=t.donateTitle;
  document.getElementById('donate-desc').textContent=t.donateDesc;
  var ec=document.getElementById('email-links');ec.innerHTML='';
